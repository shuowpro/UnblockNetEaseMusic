name: Unblock NetEase Music

on:
  schedule:
    - cron: "1 0 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh NetEase Music token
        env:
          MUSIC_U: ${{ secrets.MUSIC_U }}
        run: python script.py
